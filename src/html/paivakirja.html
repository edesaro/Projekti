<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Päiväkirja</title>
  <link rel="stylesheet" href="../css/global.css">
</head>
<body>

<nav>
  <div class="nav-left">VitalFit</div>

  <div class="nav-right">
    <a href="home.html">Koti</a>
    <a href="bmi.html">BMI Laskuri</a>
    <a href="paivakirja.html" class="active">Päiväkirja</a>
    <button id="logoutBtn" class="logout-btn">Kirjaudu ulos</button>
  </div>
</nav>

<main>
  <div class="page-container">

    <h2>Päiväkirja</h2>

    <button class="big-btn" id="newEntryBtn">Uusi päivämerkintä</button>

    <!-- LOMAKE -->
    <div id="entryForm" class="entry-form hidden fade-in-up">

      <h3>Lisää uusi merkintä</h3>

      <label>Paino (kg)</label>
      <input type="number" id="weight" placeholder="esim. 75" step="0.1">

      <label>Pituus (cm)</label>
      <input type="number" id="height" placeholder="esim. 175" step="0.1">

      <button class="big-btn" id="calcBmiBtn">Laske BMI</button>

      <label>BMI</label>
      <input type="number" id="bmi" readonly>

      <label>Nukutut tunnit</label>
      <input type="number" id="sleep" placeholder="esim. 7.5" step="0.1">

      <label>Olotila</label>
      <select id="mood">
        <option value="huono">Huono</option>
        <option value="hyvä">Hyvä</option>
        <option value="erinomainen">Erinomainen</option>
      </select>

      <label>Kommentti</label>
      <textarea id="comment" placeholder="Kirjoita fiilikset tähän..."></textarea>

      <button class="big-btn" id="saveEntryBtn">Tallenna merkintä</button>
    </div>

    <!-- MERKINTÄLAATIKOT -->
    <div id="entriesContainer" class="entries-grid fade-in-up"></div>

  </div>
</main>

<footer>
  © 2026 VitalFit Studio
</footer>

<script type="module" src="../js/logout.js"></script>
<script type="module" src="../js/paivakirja.js"></script>

</body>
</html>
